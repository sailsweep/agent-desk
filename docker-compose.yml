services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cs_ai_agent
      MYSQL_USER: cs_ai_agent
      MYSQL_PASSWORD: cs_ai_agent_password
      MYSQL_ROOT_PASSWORD: cs_ai_agent_root_password
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u\"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  cs-ai-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: mlogclub/agent-desk:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8083:8083"
    volumes:
      - cs-ai-agent-data:/app/data
      - ./docker/cs-ai-agent.yaml:/app/config/config.yaml:ro
    environment:
      TZ: Asia/Shanghai

volumes:
  mysql-data:
  qdrant-data:
  cs-ai-agent-data:
